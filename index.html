<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>La Carta</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pompiere&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/css/splide-core.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>La Carta</h1>
      <div class="header-actions" id="header-actions">
        <button id="btn-search" aria-label="Hľadať"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
        <button id="btn-settings" aria-label="Nastavenia"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></button>
      </div>
      <div id="search-bar" class="hidden">
        <input type="text" id="search-input" placeholder="Hľadať kartu..." autocomplete="off">
        <button id="btn-search-close" aria-label="Zatvoriť hľadanie">✕</button>
      </div>
    </header>
    <div id="search-feedback" class="hidden"></div>
    <main id="main">
      <div id="card-area">
        <div id="card-container" class="splide">
          <div class="splide__track">
            <div class="splide__list"></div>
          </div>
        </div>
      </div>
      <div id="card-counter">0 / 0</div>
      <div class="nav-bottom" id="nav-bottom">
        <button id="btn-prev" class="nav-arrow" aria-label="Predchádzajúca karta">‹</button>
        <button id="btn-add" aria-label="Pridať kartu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
        <button id="btn-next" class="nav-arrow" aria-label="Ďalšia karta">›</button>
      </div>
      <div id="empty-state" class="hidden">
        <p>Zatiaľ nemáš žiadne karty.</p>
        <p>Klikni na tlačidlo nižšie a pridaj prvú kartu!</p>
      </div>
    </main>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2 id="modal-title">Nová karta</h2>
      <form id="card-form">
        <div class="form-group">
          <label for="input-front">Slovo / Fráza</label>
          <input type="text" id="input-front" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="input-hint">Pomôcka (voliteľné)</label>
          <input type="text" id="input-hint" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="input-back">Preklad</label>
          <div class="input-with-button">
            <input type="text" id="input-back" required autocomplete="off">
            <button type="button" id="btn-translate" title="Automaticky preložiť">🌐</button>
          </div>
        </div>
        <div class="form-group">
          <label>Farba karty</label>
          <div id="color-picker"></div>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-delete" class="btn-danger hidden" aria-label="Vymazať kartu">Vymazať</button>
          <button type="button" id="btn-cancel">Zrušiť</button>
          <button type="submit" id="btn-save">Pridať</button>
        </div>
      </form>
    </div>
  </div>

  <div id="settings-overlay" class="hidden">
    <div id="settings-modal">
      <h2 id="settings-title">Nastavenia</h2>
      <div class="settings-toggle">
        <span>Navigačné šípky</span>
        <label class="toggle">
          <input type="checkbox" id="toggle-arrows" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>

      <!-- Font Size Settings -->
      <div class="settings-section">
        <h3 class="settings-section-title">Veľkosť textu</h3>
        
        <!-- Front text size -->
        <div class="font-size-control">
          <label>Slovo (predná strana)</label>
          <div class="font-size-adjuster">
            <button type="button" class="font-size-btn" id="btn-front-minus">−</button>
            <span class="font-size-value" id="front-size-value">100%</span>
            <button type="button" class="font-size-btn" id="btn-front-plus">+</button>
          </div>
          <div class="font-preview" id="front-preview">asdfasdf</div>
        </div>

        <!-- Back text size -->
        <div class="font-size-control">
          <label>Preklad (zadná strana)</label>
          <div class="font-size-adjuster">
            <button type="button" class="font-size-btn" id="btn-back-minus">−</button>
            <span class="font-size-value" id="back-size-value">100%</span>
            <button type="button" class="font-size-btn" id="btn-back-plus">+</button>
          </div>
          <div class="font-preview" id="back-preview">translation</div>
        </div>
      </div>

      <div class="settings-actions">
        <button id="btn-export" class="settings-btn">📥 Exportovať karty</button>
        <button id="btn-import" class="settings-btn">📤 Importovať karty</button>
      </div>
      <p class="settings-info">Export vytvorí .json súbor so všetkými kartami. Import nahradí existujúce karty.</p>
      <button id="btn-settings-close" class="settings-close">Zavrieť</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@splidejs/splide@4.1.4/dist/js/splide.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
