<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#4A90D9">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>la-word</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>la-word</h1>
      <button id="btn-add" aria-label="Pridať kartu">+</button>
    </header>
    <main id="main">
      <div id="card-area">
        <button id="btn-prev" class="nav-arrow" aria-label="Predchádzajúca karta">‹</button>
        <div id="card-container">
          <div id="card" class="card">
            <div class="card-inner">
              <div class="card-front">
                <span id="card-front-text"></span>
                <span id="card-hint" class="hint"></span>
              </div>
              <div class="card-back">
                <span id="card-back-text"></span>
              </div>
            </div>
          </div>
        </div>
        <button id="btn-next" class="nav-arrow" aria-label="Ďalšia karta">›</button>
      </div>
      <div id="empty-state" class="hidden">
        <p>Zatiaľ nemáš žiadne karty.</p>
        <p>Klikni na <strong>+</strong> a pridaj prvú kartu!</p>
      </div>
    </main>
    <div id="card-counter">0 / 0</div>
  </div>

  <div id="modal-overlay" class="hidden">
    <div id="modal">
      <h2 id="modal-title">Nová karta</h2>
      <form id="card-form">
        <div class="form-group">
          <label for="input-front">Slovo / Fráza</label>
          <input type="text" id="input-front" required autocomplete="off">
        </div>
        <div class="form-group">
          <label for="input-hint">Pomôcka (voliteľné)</label>
          <input type="text" id="input-hint" autocomplete="off">
        </div>
        <div class="form-group">
          <label for="input-back">Preklad</label>
          <div class="input-with-button">
            <input type="text" id="input-back" required autocomplete="off">
            <button type="button" id="btn-translate" title="Automaticky preložiť">🌐</button>
          </div>
        </div>
        <div class="form-group">
          <label>Farba karty</label>
          <div id="color-picker"></div>
        </div>
        <div class="form-actions">
          <button type="button" id="btn-cancel">Zrušiť</button>
          <button type="submit" id="btn-save">Pridať</button>
        </div>
      </form>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/cards.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
